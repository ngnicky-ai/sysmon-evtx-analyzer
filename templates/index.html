<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sysmon EVTX Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .container {
            text-align: center;
            max-width: 640px;
            width: 100%;
            padding: 2rem;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }
        .upload-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 1rem;
            padding: 2.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        .drop-zone {
            border: 2px dashed rgba(96, 165, 250, 0.4);
            border-radius: 0.75rem;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #60a5fa;
            background: rgba(59, 130, 246, 0.05);
        }
        .drop-zone .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .drop-zone p { color: #94a3b8; font-size: 0.95rem; }
        .drop-zone .filename {
            color: #60a5fa;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 0.5rem;
        }
        .drop-zone input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            opacity: 0;
            cursor: pointer;
        }
        .btn {
            display: inline-block;
            padding: 0.85rem 2.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: #64748b;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid rgba(148, 163, 184, 0.15);
        }
        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.2);
            width: 100%;
        }
        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.15);
            color: #e2e8f0;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }
        .feature {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.08);
            border-radius: 0.75rem;
            padding: 1.25rem 0.75rem;
        }
        .feature .fi { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .feature h3 { font-size: 0.8rem; color: #cbd5e1; margin-bottom: 0.25rem; }
        .feature p { font-size: 0.7rem; color: #64748b; }
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️</div>
        <h1>Sysmon EVTX Analyzer</h1>
        <p class="subtitle">Windows 이벤트 로그를 분석하고 보안 위협을 탐지합니다</p>

        <div class="upload-card">
            <form id="uploadForm" action="/analyze" method="post" enctype="multipart/form-data">
                <div class="drop-zone" id="dropZone">
                    <div class="icon">📁</div>
                    <p>EVTX 파일을 드래그하거나 클릭하여 업로드</p>
                    <p class="filename" id="fileName"></p>
                    <input type="file" name="evtx_file" id="evtxFile" accept=".evtx">
                </div>
                <button type="submit" class="btn btn-primary" id="analyzeBtn" disabled>
                    <span id="btnText">분석 시작</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </form>
            <div class="divider">또는</div>
            <a href="/analyze_default" class="btn btn-secondary" id="defaultBtn">
                기본 샘플 파일로 분석 (01_sysmon_quiz.evtx)
            </a>
        </div>

        <div class="features">
            <div class="feature">
                <div class="fi">📊</div>
                <h3>타임라인 시각화</h3>
                <p>이벤트 시간순 분석</p>
            </div>
            <div class="feature">
                <div class="fi">🔍</div>
                <h3>위협 탐지</h3>
                <p>MITRE ATT&CK 기반</p>
            </div>
            <div class="feature">
                <div class="fi">📄</div>
                <h3>보고서 다운로드</h3>
                <p>HTML 리포트 생성</p>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('evtxFile');
        const fileName = document.getElementById('fileName');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const form = document.getElementById('uploadForm');

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileName.textContent = fileInput.files[0].name;
                analyzeBtn.disabled = false;
            }
        });

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            if (fileInput.files.length > 0) {
                fileName.textContent = fileInput.files[0].name;
                analyzeBtn.disabled = false;
            }
        });

        form.addEventListener('submit', () => {
            document.getElementById('btnText').style.display = 'none';
            document.getElementById('spinner').style.display = 'block';
            analyzeBtn.disabled = true;
        });

        document.getElementById('defaultBtn').addEventListener('click', function() {
            this.textContent = '분석 중...';
            this.style.pointerEvents = 'none';
        });
    </script>
</body>
</html>
